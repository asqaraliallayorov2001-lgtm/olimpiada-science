<style>
  :root{
    --bg: #EAEEDF;
    --bg-card: #F6F7EE;
    --ink: #15271D;
    --ink-soft: #46594C;
    --pine: #1E3A2C;
    --leaf: #5C8A56;
    --ochre: #C08A2E;
    --rust: #A8452F;
    --line: #C9D1BC;
    --radius: 4px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Karla', sans-serif;
    min-height:100vh;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(30,58,44,0.06) 1px, transparent 0);
    background-size: 22px 22px;
  }
  header{
    padding:28px 6vw 20px;
    border-bottom:2px solid var(--pine);
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:12px;
  }
  .brand{display:flex; align-items:baseline; gap:12px;}
  .brand-mark{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:1.5rem;
    letter-spacing:-0.01em;
    color:var(--pine);
  }
  .brand-tag{
    font-size:0.72rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink-soft);
    border-left:2px solid var(--ochre);
    padding-left:10px;
  }
  .progress-summary{
    font-size:0.85rem;
    color:var(--ink-soft);
    text-align:right;
  }
  .progress-summary strong{color:var(--pine); font-family:'Fraunces',serif; font-size:1.1rem;}

  main{padding:36px 6vw 80px; max-width:1200px; margin:0 auto;}

  .section-eyebrow{
    font-size:0.72rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ochre);
    font-weight:700;
    margin-bottom:6px;
  }
  h1.page-title{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:2.1rem;
    color:var(--pine);
    margin-bottom:28px;
    max-width:640px;
    line-height:1.15;
  }

  .subject-tabs{
    display:flex;
    gap:8px;
    margin-bottom:26px;
    border-bottom:2px solid var(--line);
  }
  .subject-tab{
    background:none;
    border:none;
    padding:10px 4px;
    margin-bottom:-2px;
    font-family:'Fraunces', serif;
    font-size:1.05rem;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .subject-tab + .subject-tab{margin-left:22px;}
  .subject-tab.active{
    color:var(--pine);
    border-bottom-color:var(--ochre);
  }
  .subject-tab .count{
    font-family:'Karla', sans-serif;
    font-size:0.75rem;
    color:var(--ink-soft);
    font-weight:600;
  }

  .catalog{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:18px;
  }

  .specimen{
    background:var(--bg-card);
    border:1.5px solid var(--line);
    border-radius:var(--radius);
    padding:20px 18px;
    position:relative;
    display:flex;
    flex-direction:column;
    gap:10px;
    transition:transform .15s ease, border-color .15s ease;
  }
  .specimen.unlocked:hover{
    transform:translateY(-3px);
    border-color:var(--leaf);
    cursor:pointer;
  }
  .specimen.locked{opacity:0.55;}
  .specimen.done{border-color:var(--leaf);}

  .accession{
    font-family:'Fraunces', serif;
    font-size:0.78rem;
    color:var(--ink-soft);
    letter-spacing:0.06em;
  }
  .specimen h3{
    font-family:'Fraunces', serif;
    font-size:1.28rem;
    font-weight:600;
    color:var(--pine);
    line-height:1.25;
  }
  .specimen p.desc{font-size:0.86rem; color:var(--ink-soft); flex-grow:1;}

  .status-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:6px;
    font-size:0.78rem;
  }
  .badge{
    padding:3px 9px;
    border-radius:20px;
    font-weight:600;
    font-size:0.72rem;
    letter-spacing:0.02em;
  }
  .badge.locked{background:#E3DED0; color:var(--ink-soft);}
  .badge.ready{background:#E4EEDD; color:var(--leaf);}
  .badge.passed{background:var(--pine); color:#fff;}
  .badge.retry{background:#F4E0D8; color:var(--rust);}
  .best-score{color:var(--ink-soft);}

  .telegram-link{
    font-size:0.78rem;
    color:var(--ochre);
    text-decoration:none;
    border-bottom:1px dashed var(--ochre);
    align-self:flex-start;
  }

  .back-link{

  .quiz-progress-bar{

    width:100%;

    border-radius:4px;
    overflow:hidden;
    margin-bottom:28px;

  .option.incorrect{border-color:var(--rust); background:#F8DFD8;}

    font-weight:600;

const PASS_THRESHOLD = 80; // % — shu balldan yuqori bo'lsa keyingi mavzu ochiladi

/* ============================================================
   2) NATIJALARNI SAQLASH (brauzerning localStorage xotirasi)
   ============================================================ */
const STORAGE_KEY = "bioloriy_progress_v1";
function loadProgress(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveProgress(p){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}
let progress = loadProgress(); // { topicId: { bestScore: number, passed: bool } }

/* ============================================================
   3) KATALOG (mavzular ro'yxati) RENDER QILISH
   ============================================================ */
const catalogView = document.getElementById('catalogView');
const catalogGrid = document.getElementById('catalogGrid');
const quizView = document.getElementById('quizView');
const resultView = document.getElementById('resultView');

let currentSubject = "science";

function topicsOf(subjectId){
  return TOPICS.filter(t => t.subject === subjectId);
}

function isUnlocked(topic){
  const subjectTopics = topicsOf(topic.subject);
  const idxInSubject = subjectTopics.findIndex(t => t.id === topic.id);
  if(idxInSubject === 0) return true;
  const prevId = subjectTopics[idxInSubject - 1].id;
  return progress[prevId] && progress[prevId].passed;
}

function renderTabs(){
  const tabsEl = document.getElementById('subjectTabs');
  tabsEl.innerHTML = "";
  SUBJECTS.forEach(s => {
    const subjectTopics = topicsOf(s.id);
    const doneInSubject = subjectTopics.filter(t => progress[t.id] && progress[t.id].passed).length;
    const btn = document.createElement('button');
    btn.className = 'subject-tab' + (s.id === currentSubject ? ' active' : '');
    btn.innerHTML = `${s.label} <span class="count">(${doneInSubject}/${subjectTopics.length})</span>`;
    btn.addEventListener('click', () => { currentSubject = s.id; renderCatalog(); });
    tabsEl.appendChild(btn);
  });
}

function renderCatalog(){
  renderTabs();
  catalogGrid.innerHTML = "";
  const visibleTopics = topicsOf(currentSubject);

  if(visibleTopics.length === 0){
    catalogGrid.innerHTML = `<div style="grid-column:1/-1; padding:40px 20px; text-align:center; color:var(--ink-soft); border:1.5px dashed var(--line); border-radius:4px;">
      🌱 Bu bo'lim uchun mavzular tez orada qo'shiladi.
    </div>`;
    document.getElementById('progressCount').textContent = `${TOPICS.filter(t => progress[t.id] && progress[t.id].passed).length} / ${TOPICS.length}`;
    return;
  }

  visibleTopics.forEach((t) => {
    const unlocked = isUnlocked(t);
    const rec = progress[t.id];

    const card = document.createElement('div');
    card.className = 'specimen ' + (unlocked ? 'unlocked' : 'locked') + (rec && rec.passed ? ' done' : '');

    let badgeHtml;
    if(!unlocked){
      badgeHtml = `<span class="badge locked">🔒 Yopiq</span>`;
    } else if(rec && rec.passed){
      badgeHtml = `<span class="badge passed">✓ O'zlashtirildi</span><span class="best-score">${rec.bestScore}%</span>`;
    } else if(rec && !rec.passed){
      badgeHtml = `<span class="badge retry">Qayta urinish</span><span class="best-score">eng yaxshi: ${rec.bestScore}%</span>`;
    } else {
      badgeHtml = `<span class="badge ready">Boshlashga tayyor</span>`;
    }

    card.innerHTML = `
      <div class="accession">${t.accession}</div>
      <h3>${t.title}</h3>
      <p class="desc">${t.desc}</p>
      ${unlocked ? `<a class="telegram-link" href="${t.telegram}" target="_blank" onclick="event.stopPropagation()">📎 Telegramda o'rganish</a>` : ''}
      <div class="status-row">${badgeHtml}</div>
    `;

    if(unlocked){
      card.addEventListener('click', () => startQuiz(TOPICS.findIndex(x => x.id === t.id)));
    }
    catalogGrid.appendChild(card);
  });

  const doneCount = TOPICS.filter(t => progress[t.id] && progress[t.id].passed).length;
  document.getElementById('progressCount').textContent = `${doneCount} / ${TOPICS.length}`;
}

/* ============================================================
   4) TEST (QUIZ) MANTIG'I
   ============================================================ */
let currentTopicIndex = null;
let currentQuestionIndex = 0;
let answers = [];
let selectedOption = null;

function startQuiz(index){
  currentTopicIndex = index;
  currentQuestionIndex = 0;
  answers = [];
  selectedOption = null;
  catalogView.style.display = 'none';
  resultView.style.display = 'none';
  quizView.style.display = 'block';
  document.getElementById('quizTopicName').textContent = TOPICS[index].title;
  renderQuestion();
}

function renderQuestion(){
  const topic = TOPICS[currentTopicIndex];
  const q = topic.questions[currentQuestionIndex];
  selectedOption = null;

  document.getElementById('qNumber').textContent = `Savol ${currentQuestionIndex+1} / ${topic.questions.length}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('quizProgressFill').style.width = `${(currentQuestionIndex/topic.questions.length)*100}%`;

  const optsContainer = document.getElementById('qOptions');
  optsContainer.innerHTML = "";
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectOption(i, btn));
    optsContainer.appendChild(btn);
  });

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = true;
  nextBtn.textContent = (currentQuestionIndex === topic.questions.length - 1) ? "Testni yakunlash" : "Keyingi savol";
  nextBtn.onclick = confirmAnswer;
}

function selectOption(i, btn){
  if(document.querySelectorAll('.option')[0].disabled) return; // already answered
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOption = i;
  document.getElementById('nextBtn').disabled = false;
}

function confirmAnswer(){
  const topic = TOPICS[currentTopicIndex];
  const q = topic.questions[currentQuestionIndex];
  const optionButtons = document.querySelectorAll('.option');

  // agar hali javob tekshirilmagan bo'lsa — tekshiramiz va rangla
  if(!optionButtons[0].disabled){
    optionButtons.forEach((btn, i) => {
      btn.disabled = true;
      if(i === q.correct) btn.classList.add('correct');
      else if(i === selectedOption) btn.classList.add('incorrect');
    });
    answers.push(selectedOption === q.correct);
    document.getElementById('nextBtn').textContent = (currentQuestionIndex === topic.questions.length - 1) ? "Natijani ko'rish" : "Keyingi savol →";
    return;
  }

  // ikkinchi bosishda — keyingi savolga o'tamiz
  if(currentQuestionIndex < topic.questions.length - 1){
    currentQuestionIndex++;
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz(){
  const topic = TOPICS[currentTopicIndex];
  const correctCount = answers.filter(Boolean).length;
  const scorePct = Math.round((correctCount / topic.questions.length) * 100);
  const passed = scorePct >= PASS_THRESHOLD;

  const prevBest = (progress[topic.id] && progress[topic.id].bestScore) || 0;
  progress[topic.id] = {
    bestScore: Math.max(prevBest, scorePct),
    passed: passed || (progress[topic.id] && progress[topic.id].passed) || false
  };
  saveProgress(progress);

  quizView.style.display = 'none';
  resultView.style.display = 'block';
  document.getElementById('resultScore').textContent = `${scorePct}%`;
  const verdictEl = document.getElementById('resultVerdict');
  const descEl = document.getElementById('resultDesc');
  if(passed){
    verdictEl.textContent = "O'tdingiz! 🎉";
    verdictEl.className = "result-verdict pass";
    descEl.textContent = `Siz ${PASS_THRESHOLD}% bo'sag'asidan o'tdingiz. Keyingi mavzu endi ochiq.`;
  } else {
    verdictEl.textContent = "Hali yetarli emas";
    verdictEl.className = "result-verdict fail";
    descEl.textContent = `Keyingi mavzuga o'tish uchun kamida ${PASS_THRESHOLD}% kerak. Mavzuni Telegramda qayta o'rganib, testni qayta ishlang.`;
  }

  document.getElementById('retryBtn').onclick = () => startQuiz(currentTopicIndex);
  document.getElementById('continueBtn').onclick = () => {
    resultView.style.display = 'none';
    catalogView.style.display = 'block';
    renderCatalog();
  };
}

document.getElementById('backLink').addEventListener('click', (e) => {
  e.preventDefault();
  quizView.style.display = 'none';
  catalogView.style.display = 'block';
  renderCatalog();
});

/* ============================================================
   5) BOSHLASH
   ============================================================ */
renderCatalog();
</script>
